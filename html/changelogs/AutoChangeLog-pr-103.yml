author: "Verbs, Chromeazul"
delete-after: True
changes:
  - rscadd: "MA5B (SMG equivalent, fast firing, somewhat lower damage, large scatter, larger magazines)"
  - rscadd: "M6D (very good at everything)"
  - rscadd: "Large gun racks for MA5B, MA5C, and BR55"
  - rscadd: "Large gun racks also automatically restock their weapons"
  - rscadd: "SPNKr can now be team reloaded."
  - rscadd: "SPNKr can now lock onto air targets with unique action, with GMs being able to determine the outcome of it."
  - rscadd: "Energy sword"
  - code_imp: "Made it so muzzles and barrels and shrouds weren't all separate on the MA5C, same for MA5B."
  - imageadd: "Covenant weapon onmobs"
  - imageadd: "Weapon cursors for most halo guns"
  - imageadd: "New sprites for the MA5C and the grenade launcher"
  - balance: "Buffed sniper, gave it more damage and a lot of penetration, as well as IFF"
  - bugfix: "Fixed SPNKr ammo & SPNKrs themselves going into small storage spaces."
  - bugfix: "Loaded SPNKr rockets now update when spent."
  - spellcheck: "Fixed SRS-99AM (should be SRS99-AM) on spec box."
  - maptweak: "Added the new big weapon racks to the armories"
  - maptweak: "Adjusted the base Dark Was the Night armory for marines to be a little larger where the ammo storage is."